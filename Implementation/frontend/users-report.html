<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Users Report</title>
    <script src="authGuard.js"></script>
    <link rel="stylesheet" href="css/attReport.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>
    <nav class="navbar">
        <h2>Church Admin</h2>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="users-report.html">Users Report</a></li>
        </ul>
    </nav>

    <div class="table-container">
        <!-- <h2>System Users</h2> -->
        <h2 id="reportTitle">System Users</h2>
        <div class="filters">
            <button onclick="exportCSV()">Export CSV</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Created</th>
                    <!-- <th>Actions</th> -->
                    <th id="actionsHeader">Actions</th>
                </tr>
            </thead>
            <tbody id="usersTable"></tbody>
        </table>
    </div>

    <script>
        requireRole("ADMIN"); // ADMIN ONLY

        const params = new URLSearchParams(window.location.search);
        const filter = params.get("filter");
        const API_URL = "http://localhost:5000/api/users";
        const token = localStorage.getItem("token");
        let usersData = []; // GLOBAL storage for CSV

        async function loadUsers() {
            try {

                let url = API_URL;
                //If active filter is selected
                if (filter === "active") {
                    url = API_URL + "/active-users";
                }

                const res = await fetch(url, {
                    headers: {
                        Authorization: `Bearer ${token}`
                    }
                });

                console.log("STATUS:", res.status);

                if (!res.ok) {
                    const errorText = await res.text();
                    console.error("API ERROR:", errorText);
                    alert("Failed to load users");
                    return;
                }

                if (filter === "active") {
                    document.getElementById("reportTitle").innerText = "Current - Active - Users";
                }

                if (filter === "active") {
                    document.getElementById("actionsHeader").remove();
                }

                const users = await res.json();
                usersData = users; //store for CSV

                const table = document.getElementById("usersTable");
                table.innerHTML = "";

                users.forEach(user => {

                    let actionsColumn = "";

                    if (filter !== "active") {
                        actionsColumn = `
      <td class="actions">
        <i class="fa-solid fa-pen" onclick="enableEdit(this, '${user._id}')"></i>
        <i class="fa-solid fa-trash" onclick="deleteUser('${user._id}')"></i>
      </td>
    `;
                    }
                    const row = document.createElement("tr");
                    row.setAttribute("data-id", user._id);
                    row.innerHTML = `
  <td class="name">${user.name}</td>
  <td class="email">${user.email}</td>
  <td class="role">${user.role}</td>
  <td>${user.createdAt.split("T")[0]}</td>
  ${actionsColumn}
`;
                    table.appendChild(row);
                });
            } catch (err) {
                console.error("FETCH ERROR:", err);
                alert("Unexpected error loading users");
            }
        }

        function editUser(id) {
            window.location.href = `edit-user.html?id=${id}`;
        }

        async function deleteUser(id) {
            if (!confirm("Delete this user?")) return;

            const res = await fetch(`${API_URL}/${id}`, {
                method: "DELETE",
                headers: {
                    Authorization: `Bearer ${token}`
                }
            });

            if (res.ok) {
                loadUsers();
            } else {
                alert("Delete failed");
            }
        }

        function editUser(id) {
            window.location.href = `edit-user.html?id=${id}`;
        }

        async function deleteUser(id) {
            if (!confirm("Delete this user?")) return;

            const res = await fetch(`${API_URL}/${id}`, {
                method: "DELETE",
                headers: {
                    Authorization: `Bearer ${token}`
                }
            });

            if (res.ok) {
                loadUsers();
            } else {
                alert("Delete failed");
            }
        }

        function enableEdit(icon, userId) {
            const row = icon.closest("tr");

            // Store original values (for cancel)
            row.dataset.originalName = row.querySelector(".name").innerText;
            row.dataset.originalEmail = row.querySelector(".email").innerText;
            row.dataset.originalRole = row.querySelector(".role").innerText;

            // Make editable
            row.querySelector(".name").contentEditable = true;
            row.querySelector(".email").contentEditable = true;

            //role text is radio buttons
            const roleCell = row.querySelector(".role");
            const currentRole = roleCell.innerText;
            roleCell.innerHTML = `
        <label><input type="radio" name="role-${userId}" value="ADMIN" ${currentRole === 'ADMIN' ? 'checked' : ''}> ADMIN</label>
        <label><input type="radio" name="role-${userId}" value="PASTOR" ${currentRole === 'PASTOR' ? 'checked' : ''}> PASTOR</label>
        <label><input type="radio" name="role-${userId}" value="STAFF" ${currentRole === 'STAFF' ? 'checked' : ''}> STAFF</label>
        <label><input type="radio" name="role-${userId}" value="TREASURER" ${currentRole === 'TREASURER' ? 'checked' : ''}> TREASURER</label>
    `;

            // Highlight editable row
            row.style.backgroundColor = "#fff3cd";

            // Change icons to Save + Cancel
            const actionsCell = row.querySelector(".actions");
            actionsCell.innerHTML = `
        <i class="fa-solid fa-check icon-save" onclick="saveEdit(this, '${userId}')"></i>
        <i class="fa-solid fa-times icon-cancel" onclick="cancelEdit(this)"></i>
    `;
        }

        async function saveEdit(icon, userId) {
            const row = icon.closest("tr");

            const updatedData = {
                name: row.querySelector(".name").innerText,
                email: row.querySelector(".email").innerText,
                role: row.querySelector(`input[name="role-${userId}"]:checked`).value
            };

            try {
                const res = await fetch(`${API_URL}/${userId}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: `Bearer ${token}`
                    },
                    body: JSON.stringify(updatedData)
                });

                if (!res.ok) {
                    throw new Error("Update failed");
                }

                // Remove editable mode
                row.querySelector(".name").contentEditable = false;
                row.querySelector(".email").contentEditable = false;
                row.querySelector(".role").innerText = updatedData.role;

                row.style.backgroundColor = "";

                // Restore icons
                const actionsCell = row.querySelector(".actions");
                actionsCell.innerHTML = `
            <i class="fa-solid fa-pen" onclick="enableEdit(this, '${userId}')"></i>
            <i class="fa-solid fa-trash" onclick="deleteUser('${userId}')"></i>
        `;

            } catch (err) {
                alert("Error saving changes");
                console.error(err);
            }
        }

        function cancelEdit(icon) {
            const row = icon.closest("tr");

            // Restore original values
            row.querySelector(".name").innerText = row.dataset.originalName;
            row.querySelector(".email").innerText = row.dataset.originalEmail;
            row.querySelector(".role").innerText = row.dataset.originalRole;

            // Disable editing
            row.querySelector(".name").contentEditable = false;
            row.querySelector(".email").contentEditable = false;

            row.style.backgroundColor = "";

            const userId = row.getAttribute("data-id");

            // Restore icons
            const actionsCell = row.querySelector(".actions");
            actionsCell.innerHTML = `
        <i class="fa-solid fa-pen" onclick="enableEdit(this, '${userId}')"></i>
        <i class="fa-solid fa-trash" onclick="deleteUser('${userId}')"></i>
    `;
        }

        function exportCSV() {
            if (usersData.length === 0) {
                alert("No data to export");
                return;
            }

            let csv = "Name,Email,Role,Created\n";
            usersData.forEach(u => {
                csv += `"${u.name}","${u.email}","${u.role}","${u.createdAt.split("T")[0]}"\n`;
            });

            const blob = new Blob([csv], { type: "text/csv" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "users_report.csv";
            a.click();
        }
        loadUsers();
    </script>
</body>

</html>
