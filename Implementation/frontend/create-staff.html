<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Create Staff | Admin</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/create-user.css">
</head>

<body>

  <nav class="navbar">
    <h2>Church Admin</h2>
    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="staff-summary.html">Staff</a></li>
      <li><a href="staff-report.html">Staff-Report</a></li>
    </ul>
  </nav>

  <div class="form-container">
    <h2>Add New Staff</h2>

    <input id="name" placeholder="Full Name">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <div class="role-container">
      <p>Select Role:</p>
      <div class="role-options">
        <label><input type="radio" name="role" value="STAFF"> Staff</label>
        <label><input type="radio" name="role" value="PASTOR"> Pastor</label>
        <label><input type="radio" name="role" value="TREASURER"> Treasurer</label>
        <label><input type="radio" name="role" value="ADMIN"> Admin</label>
      </div>
    </div>

    <button type="button" onclick="createUser()">Add Staff</button>
    <p id="message"></p>
  </div>

  <script src="authGuard.js"></script>
  <script src="create-staff.js"></script>

</body>

</html>
