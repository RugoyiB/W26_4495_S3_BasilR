<!DOCTYPE html>
<html>

<head>
  <title>Add Financial Record</title>
  <script src="authGuard.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <nav class="navbar">
    <h2>Church Admin</h2>
    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="finance-summary.html">Finance</a></li>
      <li><a href="finance-report.html">Finance Report</a></li>
    </ul>
  </nav>

  <div class="form-container">
    <h2>Add Record</h2>

    <select id="member"></select>
    <input id="donorName" placeholder="Donor Name (if not a member)">

    <input id="amount" type="number" placeholder="Amount">
    <input type="date" id="date">


    <!-- Select Type -->
    <div class="radio-group">
      <p>Select Type:</p>
      <label><input type="radio" name="type" value="Tithe"> Tithe</label>
      <label><input type="radio" name="type" value="Offering"> Offering</label>
      <label><input type="radio" name="type" value="Donation"> Donation</label>
    </div>

    <!-- Payment Method -->
    <div class="radio-group">
      <p>Payment Method:</p>
      <label><input type="radio" name="paymentMethod" value="Cash"> Cash</label>
      <label><input type="radio" name="paymentMethod" value="Bank Transfer"> Bank Transfer</label>
      <label><input type="radio" name="paymentMethod" value="E-transfer"> E-transfer</label>
    </div>

    <textarea id="notes" placeholder="Notes (optional)"></textarea>

    <button onclick="saveFinance()">Add Record</button>
    <p id="message"></p>
  </div>

  <script>
    const API_FINANCE = "http://localhost:5000/api/finances";
    const API_MEMBERS = "http://localhost:5000/api/members";

    async function loadMembers() {
      const token = localStorage.getItem("token");

      const res = await fetch(API_MEMBERS, {
        headers: { "Authorization": `Bearer ${token}` }
      });

      const members = await res.json();

      const select = document.getElementById("member");

      //Add default option
      select.innerHTML = `<option value="">-- Non-Member / Guest --</option>`;

      members.forEach(m => {
        select.innerHTML += `<option value="${m._id}">
        ${m.firstName} ${m.lastName}
      </option>`;
      });
    }

    async function saveFinance() {
      const data = {
        member: document.getElementById("member").value || null,
        donorName: document.getElementById("donorName").value || null,
        amount: parseFloat(document.getElementById("amount").value),
        type: document.querySelector('input[name="type"]:checked')?.value || "",
        paymentMethod: document.querySelector('input[name="paymentMethod"]:checked')?.value || "",
        date: document.getElementById("date").value,
        notes: document.getElementById("notes").value
      };

      const token = localStorage.getItem("token");

      if (!token) {
        alert("Please log in.");
        window.location.href = "login.html";
        return;
      }

      try {
        const res = await fetch(API_FINANCE, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          document.getElementById("message").innerText = "Record saved successfully!";
        } else {
          const errorData = await res.json();
          document.getElementById("message").innerText = errorData.message || "Error saving record.";
        }
      } catch (error) {
        document.getElementById("message").innerText = "Network error. Please try again.";
      }

    }

    loadMembers();
  </script>

</body>

</html>
