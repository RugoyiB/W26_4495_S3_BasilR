<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Add Member</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <nav class="navbar">
    <h2>Church Admin</h2>
    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="add-member.html">Add-Member</a></li>
      <li><a href="members.html">Members-Report</a></li>
    </ul>
  </nav>

  <div class="form-container">

    <h2>Add Member</h2>

    <input id="firstName" placeholder="First Name">
    <input id="lastName" placeholder="Last Name">

    <!-- Gender Radio buttons -->
    <div class="radio-group">
      <label>
        <p>Gender:</p>
      </label>
      <label><input type="radio" name="gender" value="Male"> Male</label>
      <label><input type="radio" name="gender" value="Female"> Female</label>
      <label><input type="radio" name="gender" value="Other"> Other</label>
    </div>

    <input id="phone" placeholder="Phone Number" inputmode="numeric" pattern="[0-9]*"
      oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
    <input id="email" placeholder="Email Address">
    <input id="address" placeholder="Address">

    <!-- Join Date Calendar -->
    <input type="date" id="joinDate">

    <!-- Status Radio buttons -->
    <div class="radio-group">
      <label>
        <p>Status:</p>
      </label>
      <label><input type="radio" name="status" value="Active" checked> Active</label>
      <label><input type="radio" name="status" value="Inactive"> Inactive</label>
      <label><input type="radio" name="status" value="Transferred"> Transferred</label>
    </div>

    <button onclick="addMember()">Add Member</button>

    <p id="message"></p>

  </div>

  <script>
    const token = localStorage.getItem("token");

    async function addMember() {
      const memberData = {
        firstName: document.getElementById("firstName").value,
        lastName: document.getElementById("lastName").value,
        gender: document.querySelector('input[name="gender"]:checked')?.value || "",
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        address: document.getElementById("address").value,
        joinDate: document.getElementById("joinDate").value,
        status: document.querySelector('input[name="status"]:checked')?.value || "Active"
      };

      try {
        const response = await fetch("http://localhost:5000/api/members", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify(memberData)
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "Failed to save member");
        }

        // alert("Member saved successfully!");
        document.getElementById("message").innerText = "Member added successfully!";

        document.getElementById("firstName").value = "";
        document.getElementById("lastName").value = "";
        document.querySelectorAll('input[name="gender"]').forEach(r => r.checked = false);
        document.getElementById("phone").value = "";
        document.getElementById("email").value = "";
        document.getElementById("address").value = "";
        document.getElementById("joinDate").value = "";
        document.querySelector('input[name="status"][value="Active"]').checked = true;
      } catch (error) {
        document.getElementById("message").innerText =
          "Error: " + error.message;
      }
    }
  </script>
</body>

</html>
