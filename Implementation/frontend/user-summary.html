<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>System Summary</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/usersummary.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>
  <nav class="navbar">
    <h2>Church Admin</h2>
    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="create-user.html">Add-User</a></li>
      <li><a href="users-report.html">Users-Report</a></li>
    </ul>
  </nav>

  <div class="container">

    <div class="card" onclick="goToAllUsers()">
      <div class="card-icon">
        <i class="fa-solid fa-users"></i>
      </div>
      <h2 id="totalUsers">0</h2>
      <p>Total Users</p>
    </div>

    <div class="card" onclick="goToActiveUsers()">
      <div class="card-icon active">
        <i class="fa-solid fa-user-check"></i>
      </div>
      <h2 id="activeUsers">0</h2>
      <p>Users Currently Logged In</p>
    </div>

  </div>

  <!-- Floating Buttons -->
  <div class="floating-buttons">
    <button class="add-btn" onclick="goToCreateUser()">+</button>
    <button class="report-btn" onclick="goToReport()">📊</button>
  </div>

  <script>
    const API_USERS = "http://localhost:5000/api/users";
    const API_ACTIVE = "http://localhost:5000/api/users/active";

    const token = localStorage.getItem("token");

    async function loadSummary() {
      try {
        // Total users
        const resUsers = await fetch(API_USERS, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const users = await resUsers.json();
        document.getElementById("totalUsers").innerText = users.length;

        // Active users (if backend supports it)
        try {
          const resActive = await fetch(API_ACTIVE, {
            headers: { Authorization: `Bearer ${token}` }
          });
          const active = await resActive.json();
          document.getElementById("activeUsers").innerText = active.count || active.length;
        } catch {
          document.getElementById("activeUsers").innerText = "N/A";
        }

      } catch (err) {
        console.error("Error loading summary:", err);
      }
    }

    function goToCreateUser() {
      window.location.href = "create-user.html";
    }

    function goToReport() {
      window.location.href = "users-report.html";
    }

    function goToAllUsers() {
      window.location.href = "users-report.html";
    }

    function goToActiveUsers() {
      window.location.href = "users-report.html?filter=active";
    }

    loadSummary();

    //Refresh every 5 seconds (REAL-TIME feel)
    setInterval(loadSummary, 5000);
  </script>

</body>

</html>
